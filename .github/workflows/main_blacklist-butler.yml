name: Build and deploy Blacklist butler

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main_blacklist-butler.yml"
      - "aspire/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
  workflow_dispatch:

# Add concurrency control to ensure only one deployment runs at a time
concurrency:
  group: "production-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: "Production"
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5
        name: Checkout code

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash -s -- --quality "dev"
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Install Aspire AppHost dependencies
        run: npm install
        working-directory: ./aspire

      - name: Publish Aspire Docker Compose artifacts
        run: aspire publish
        working-directory: ./aspire
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: "true"
          version: latest
          ping: ${{ secrets.SSH_HOST }}

      - name: Add SSH key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: "Deploy container"
        run: |
          docker context create "$DOCKER_CONTEXT_NAME" --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          trap 'docker context rm "$DOCKER_CONTEXT_NAME" || true' EXIT

          # The bot and migrations use the same dockerfile, so we only need to build once. 
          docker --context "$DOCKER_CONTEXT_NAME" build -t "$BOT_IMAGE" .
          docker --context "$DOCKER_CONTEXT_NAME" compose -f aspire/aspire-output/docker-compose.yaml up -d --remove-orphans
        env:
          BOT_IMAGE: blacklist-butler:${{ github.sha }}
          APPLY_MIGRATIONS_IMAGE: blacklist-butler:${{ github.sha }}
          DOCKER_CONTEXT_NAME: docker-host-${{ github.run_id }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
